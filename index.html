<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جملة عشوائية</title>

<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #f5f5f5;
}

#quote {
    font-size: 28px;
    text-align: center;
    max-width: 600px;
    padding: 20px;
}
</style>
</head>
<body>

<div id="quote"></div>

<script>
const quotes = [
    "ابتسم، يومك أجمل مما تتوقع.",
    "النجاح يبدأ بخطوة صغيرة.",
    "لا تستسلم مهما كانت الصعوبات.",
    "كل يوم فرصة جديدة.",
    "ثق بنفسك وقدراتك."
];

const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById("quote").textContent = randomQuote;
</script>

</body>
</html>
